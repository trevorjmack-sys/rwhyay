<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWHA — Soirée des statistiques</title>
<!-- Security: CSP locks down resource origins; noindex keeps it off search engines -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; form-action 'none'; frame-ancestors 'none'; base-uri 'self';">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow">
<style>
/* ── Reset ────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 1970s Hockey Night in Canada / Soirée du Hockey palette ────────── */
:root {
  /* Broadcast darkness — deep navy like a cathode-ray screen */
  --bg:        #060c18;
  --sidebar:   #0a0d1e;
  --surface:   #0f1728;
  --surface2:  #182038;
  --border:    #1e2a50;
  --border2:   #2a3868;

  /* The iconic HNIC amber — the score-box glow */
  --amber:     #d07c0a;
  --amber-hi:  #f0a000;
  --amber-lo:  #7a4a06;
  --amber-bg:  rgba(208,124,10,0.12);

  /* CBC Red — the network stripe */
  --red:       #c81400;
  --red-dim:   #7a0c00;

  /* Typography — warm cream like a 1970s TV screen */
  --text:      #ede0c0;
  --muted:     #7a7060;
  --ice:       #f0e4c4;   /* warm ice — headings */
  --dim:       #3a3828;

  /* OV tier colours */
  --ov-elite:  #f0a000;
  --ov-good:   #64b8e8;
  --ov-avg:    #7a7060;
  --ov-poor:   #b84030;

  /* Stat zone tints */
  --nhl-zone:  rgba(208,124,10,0.07);
  --fant-zone: rgba(30,42,80,0.6);

  --sidebar-w: 228px;
  --hdr-h:     56px;
}

html, body { height: 100%; overflow: hidden; }
body {
  display: flex; flex-direction: column;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 13px;
}

/* ── Header — broadcast lower-third style ─────────────────────────────── */
header {
  height: var(--hdr-h);
  background: var(--sidebar);
  border-bottom: 3px solid var(--red);
  display: flex; align-items: center;
  padding: 0 18px; gap: 14px;
  flex-shrink: 0; position: relative; z-index: 10;
  box-shadow: 0 2px 20px rgba(0,0,0,0.6);
}
.hnic-logo {
  height: 40px; width: auto;
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(208,124,10,0.4));
  cursor: pointer;
  transition: filter 0.15s;
}
.hnic-logo:hover { filter: drop-shadow(0 0 10px rgba(208,124,10,0.7)); }
.hdr-stripe {
  width: 5px; height: 34px; border-radius: 2px;
  background: var(--amber);
}
.hdr-title {
  display: flex; flex-direction: column; gap: 1px;
  cursor: pointer;
}
.hdr-title:hover h1 { color: var(--amber-hi); }
.hdr-title h1 {
  font-size: 20px; font-weight: 800; letter-spacing: 2px;
  color: var(--ice); text-transform: uppercase;
}
.hdr-title .hdr-sub {
  font-size: 10px; letter-spacing: 1.5px; color: var(--amber);
  text-transform: uppercase; font-weight: 500;
}
.hdr-search {
  flex: 1; max-width: 220px; min-width: 100px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 3px; padding: 5px 10px;
  color: var(--text); font-size: 12px; outline: none;
  transition: border-color 0.15s;
}
.hdr-search::placeholder { color: var(--muted); }
.hdr-search:focus { border-color: var(--amber-lo); }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.hdr-badge {
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); border: 1px solid var(--border2);
  padding: 3px 8px; border-radius: 3px;
}

/* ── Layout ─────────────────────────────────────────────────────────────── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
nav {
  width: var(--sidebar-w);
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  overflow-y: auto; flex-shrink: 0;
}
nav::-webkit-scrollbar { width: 4px; }
nav::-webkit-scrollbar-thumb { background: var(--border2); }

/* ── Mobile nav toggle ──────────────────────────────────────────────────── */
.nav-toggle {
  display: none;
  background: none; border: none; cursor: pointer;
  color: var(--ice); font-size: 22px; line-height: 1;
  padding: 4px 6px; flex-shrink: 0;
  transition: color 0.15s;
}
.nav-toggle:hover { color: var(--amber); }
.nav-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 19;
}
@media (max-width: 640px) {
  .nav-toggle { display: block; }
  nav {
    position: fixed; top: var(--hdr-h); left: 0; bottom: 0;
    z-index: 20; transform: translateX(-100%);
    transition: transform 0.22s ease;
  }
  nav.nav-open { transform: translateX(0); }
  .nav-overlay.nav-open { display: block; }
}

.nav-section { padding: 10px 0 4px; }
.nav-heading {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--amber-lo);
  padding: 3px 12px 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.nav-team { }
.nav-team-name {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.1s, border-color 0.1s;
}
.nav-team-name:hover { background: var(--surface); border-left-color: var(--amber-lo); }
.nav-team-name .tnm { font-weight: 700; font-size: 12px; color: var(--text); flex: 1; }
.nav-team-name .tov { font-size: 10px; color: var(--amber); font-weight: 700; }
.nav-sub { display: none; }
.nav-sub.open { display: block; }
.nav-link {
  display: block; padding: 3px 12px 3px 22px;
  font-size: 11px; color: var(--muted); cursor: pointer;
  border-left: 3px solid transparent;
  transition: color 0.1s, background 0.1s;
  text-decoration: none;
}
.nav-link:hover { color: var(--amber-hi); background: var(--surface); }
.nav-link.active {
  color: var(--amber-hi);
  border-left-color: var(--amber);
  background: var(--amber-bg);
}

/* ── Main ─────────────────────────────────────────────────────────────────── */
main {
  flex: 1; overflow-y: auto; padding: 22px 24px;
  background: var(--bg);
}
main::-webkit-scrollbar { width: 6px; }
main::-webkit-scrollbar-thumb { background: var(--border); }

/* ── Roster header ───────────────────────────────────────────────────────── */
.roster-hdr {
  display: flex; align-items: baseline; gap: 14px;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.roster-hdr h2 {
  font-size: 24px; font-weight: 800; color: var(--ice);
  letter-spacing: 0.5px; text-transform: uppercase;
}
.roster-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; padding: 3px 9px; border-radius: 3px;
}
.roster-tag.pro  { background: rgba(200,20,0,0.2); color: var(--red); border: 1px solid var(--red-dim); }
.roster-tag.farm { background: rgba(100,184,232,0.1); color: #64b8e8; border: 1px solid #1e3a58; }

.roster-meta {
  display: flex; gap: 28px; margin-bottom: 20px; flex-wrap: wrap;
  padding: 14px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px;
}
.meta-item { display: flex; flex-direction: column; gap: 3px; }
.meta-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.meta-val { font-size: 15px; font-weight: 700; color: var(--text); }
.meta-val.big { font-size: 26px; color: var(--amber-hi); line-height: 1; }

/* ── Roster section ─────────────────────────────────────────────────────── */
.roster-sect { margin-bottom: 32px; }
.sect-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--muted);
  margin-bottom: 8px; padding-left: 2px;
  display: flex; align-items: center; gap: 8px;
}
.sect-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Table ───────────────────────────────────────────────────────────────── */
.tbl-wrap { overflow-x: auto; border-radius: 4px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }

/* Column group headers */
thead tr.grp th {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; padding: 4px 8px; text-align: center;
  border-bottom: none;
}
thead tr.grp th.g-info { background: var(--surface); color: var(--muted); }
thead tr.grp th.g-nhl  {
  background: rgba(208,124,10,0.22); color: var(--amber-hi);
  border-bottom: 2px solid var(--amber);
}
thead tr.grp th.g-fant {
  background: rgba(30,40,80,0.8); color: #64b8e8;
  border-bottom: 2px solid #2a4080;
}
thead tr.grp th.g-admin { background: var(--surface); color: var(--muted); }

/* Column headers */
thead tr.cols th {
  background: var(--surface2); color: var(--muted);
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 6px 8px;
  white-space: nowrap; text-align: right;
  border-top: 1px solid var(--border);
  position: sticky; top: 0; z-index: 2;
}
thead tr.cols th.left { text-align: left; }
thead tr.cols th.nhl-col { background: var(--nhl-zone); color: var(--amber-lo); }
thead tr.cols th.fant-col { background: var(--fant-zone); color: #4a6090; }

/* ── Sortable column headers ─────────────────────────────────────────────── */
thead tr.cols th.sortable { cursor: pointer; user-select: none; }
thead tr.cols th.sortable:hover { color: var(--amber-hi); }
thead tr.cols th.sort-asc  { color: var(--amber-hi) !important; }
thead tr.cols th.sort-desc { color: var(--amber-hi) !important; }
thead tr.cols th.sort-asc::after  { content: ' ▲'; font-size: 8px; opacity: 0.8; }
thead tr.cols th.sort-desc::after { content: ' ▼'; font-size: 8px; opacity: 0.8; }

/* Data rows */
tbody tr { border-top: 1px solid var(--border); }
tbody tr:hover { background: var(--surface); }
tbody td { padding: 5px 8px; white-space: nowrap; text-align: right; vertical-align: middle; }
tbody td.left { text-align: left; }
tbody td.nhl-col { background: var(--nhl-zone); }
tbody td.fant-col { background: var(--fant-zone); }

/* OV pill */
.ov {
  display: inline-block; min-width: 28px; padding: 2px 5px;
  border-radius: 3px; font-weight: 800; font-size: 11px;
  text-align: center; letter-spacing: 0.5px;
}
.ov.elite { background: rgba(240,160,0,0.2); color: var(--ov-elite); }
.ov.good  { background: rgba(100,184,232,0.15); color: var(--ov-good); }
.ov.avg   { background: rgba(122,112,96,0.15); color: var(--ov-avg); }
.ov.poor  { background: rgba(184,64,48,0.15); color: var(--ov-poor); }

/* Player name cell */
.pnm { color: var(--ice); font-weight: 600; }
.player-link { text-decoration: none; }
.player-link:hover { color: var(--amber); text-decoration: underline; }
.tag { font-size: 9px; font-weight: 800; margin-left: 3px; vertical-align: middle; }
.tag.r { color: #50d080; }
.tag.c { color: var(--amber); }
.tag.a { color: var(--amber-lo); }
.tag.ij { color: var(--red); }
.tag.sp1 { color: #f0a000; }
.tag.sp2 { color: #f0a000; letter-spacing: -1px; }

/* Position */
.pos { color: var(--muted); font-size: 10px; font-weight: 600; min-width: 36px; text-align: left; }

/* NHL stat cells */
.nhl-pts { color: var(--amber-hi); font-weight: 700; }
.nhl-g   { color: var(--text); }
.nhl-a   { color: var(--text); }
.nhl-pm.pos-val { color: #50d080; }
.nhl-pm.neg-val { color: var(--red); }
.nhl-blank { color: var(--border2); font-size: 10px; }

/* Fantasy stat cells */
.fs { color: var(--muted); }
.fs.hi { color: var(--text); font-weight: 600; }
.fs.lo { color: var(--dim); }

/* Salary / admin */
.sal { color: var(--muted); font-size: 11px; }
.age { color: var(--muted); }

/* NHL loading spinner */
.nhl-loading { color: var(--amber-lo); font-size: 10px; animation: blink 1.4s step-end infinite; }
@keyframes blink { 50% { opacity: 0.3; } }

/* ── Home screen ─────────────────────────────────────────────────────────── */
.home h2 {
  font-size: 28px; font-weight: 800; color: var(--ice);
  text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 6px;
}
.home .home-sub { color: var(--amber); font-size: 12px; letter-spacing: 1px; margin-bottom: 24px; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(188px,1fr)); gap: 8px; }
.team-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--amber-lo);
  border-radius: 3px; padding: 12px 14px;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
}
.team-card:hover { border-top-color: var(--amber); background: var(--surface2); }
.team-card h3 { font-size: 14px; font-weight: 800; color: var(--ice); text-transform: uppercase; letter-spacing: 0.5px; }
.team-card .card-gm { font-size: 11px; color: var(--muted); margin-top: 3px; }
.team-card .card-foot { display: flex; justify-content: space-between; margin-top: 8px; align-items: baseline; }
.team-card .card-ov { font-size: 18px; font-weight: 800; color: var(--amber-hi); }
.team-card .card-farm { font-size: 10px; color: var(--muted); }
.card-standings { margin-top: 9px; border-top: 1px solid var(--border); padding-top: 7px; display: flex; flex-direction: column; gap: 4px; }
.card-std-row { display: flex; align-items: center; gap: 5px; font-size: 10px; line-height: 1.3; }
.card-std-badge { padding: 1px 5px; border-radius: 2px; font-weight: 700; font-size: 10px; letter-spacing: 0.3px; white-space: nowrap; }
.card-std-badge.cur  { background: #2a2218; color: var(--amber); border: 1px solid var(--amber-lo); }
.card-std-badge.proj { background: #161f1a; color: #5ecf80; border: 1px solid #254030; }
.card-std-pts { color: var(--ice); font-weight: 600; }
.card-std-meta { color: var(--muted); }
.card-rivalry { margin-top: 5px; padding: 4px 8px; border-radius: 3px; font-size: 9.5px; line-height: 1.45; font-style: italic; }
.card-rivalry.under   { background: rgba(220,70,30,.13);  border-left: 3px solid #d06040; color: #e89878; }
.card-rivalry.over    { background: rgba(50,190,90,.10);  border-left: 3px solid #44b868; color: #66d888; }
.card-rivalry.vanilla { background: rgba(220,200,150,.07); border-left: 3px solid #9e8e60; color: #b8a878; }

/* ── Season selector ─────────────────────────────────────────────────────── */
.season-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.season-bar label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.season-sel {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-size: 12px; font-family: inherit;
  padding: 4px 10px; border-radius: 3px; cursor: pointer;
  outline: none;
}
.season-sel:focus { border-color: var(--amber-lo); }

/* ── Search results ──────────────────────────────────────────────────────── */
.search-count { color: var(--muted); font-size: 12px; letter-spacing: 0.5px; margin-bottom: 16px; }
.search-hit-row { cursor: pointer; }
.search-hit-row:hover { background: var(--surface) !important; }
</style>
</head>
<body>

<header>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
  <img src="hnic-logo.svg"
       class="hnic-logo" alt="Hockey Night in Canada" onclick="goHome()">
  <div class="hdr-stripe"></div>
  <div class="hdr-title" onclick="goHome()">
    <h1>RWHA</h1>
    <span class="hdr-sub">Soirée des Statistiques</span>
  </div>
  <input type="search" id="player-search" class="hdr-search" placeholder="Search players…" autocomplete="off">
  <div class="hdr-right">
    <span class="hdr-badge" id="hdr-badge">22 teams</span>
    <span class="hdr-badge" id="hdr-nhl-status">NHL stats loading…</span>
  </div>
</header>

<div class="layout">
  <div class="nav-overlay" id="nav-overlay"></div>
  <nav id="sidebar"></nav>
  <main id="main"></main>
</div>

<script src="data.js"></script>
<script src="nhl_stats.js"></script>
<script src="nhl_stats_2425.js"></script>
<script>
'use strict';
const D    = window.RWHA_DATA;
const NS   = window.NHL_STATS      || {};   // 2025-26
const NS24 = window.NHL_STATS_2425 || {};   // 2024-25
const TEAMS = Object.keys(D).sort();

// ── Season selector state ────────────────────────────────────────────────────
// '2526' = current, '2425' = previous, 'comb' = combined 2024-2026
let _season = '2526';
let _currentTeam = null, _currentType = null;

// ── League standings (scraped 2026-03-08, ~53 GP played, 82 GP season) ──────
// Projection model: remaining schedule × team OV win-probability (logistic, k=0.20)
// OT rate this season: 0.185
// cur = current conf rank, pts = current points, pct = points pct,
// rem = games remaining, proj = projected final pts, projPos = projected conf rank
const STANDINGS = {
  // Wales Conference  (cur = current rank by pts; projPos = projected rank by model)
  'Gladiators': { conf:'W', cur:1,  pts:74, gp:53, pct:0.698, rem:29, proj:106, projPos:1  },
  'Fletushkas': { conf:'W', cur:2,  pts:63, gp:53, pct:0.594, rem:29, proj:99, projPos:2  },
  'Bunnies': { conf:'W', cur:3,  pts:63, gp:53, pct:0.594, rem:29, proj:88, projPos:5  },
  'Warheads': { conf:'W', cur:4,  pts:63, gp:51, pct:0.618, rem:31, proj:98, projPos:3  },
  'Jets': { conf:'W', cur:5,  pts:57, gp:54, pct:0.528, rem:28, proj:96, projPos:4  },
  'Flyers': { conf:'W', cur:6,  pts:56, gp:54, pct:0.519, rem:28, proj:87, projPos:6  },
  'Clan': { conf:'W', cur:7,  pts:56, gp:53, pct:0.528, rem:29, proj:83, projPos:8  },
  'Giants': { conf:'W', cur:8,  pts:52, gp:53, pct:0.491, rem:29, proj:87, projPos:7  },
  'Mongoloids': { conf:'W', cur:9,  pts:48, gp:53, pct:0.453, rem:28, proj:79, projPos:9  },
  'Riots': { conf:'W', cur:10,  pts:45, gp:53, pct:0.425, rem:29, proj:67, projPos:11  },
  'Aces': { conf:'W', cur:11,  pts:42, gp:54, pct:0.389, rem:28, proj:67, projPos:10  },
  // Campbell Conference
  'Oilers': { conf:'C', cur:1,  pts:80, gp:53, pct:0.755, rem:29, proj:114, projPos:2  },
  'Shitbirds': { conf:'C', cur:2,  pts:76, gp:54, pct:0.704, rem:28, proj:118, projPos:1  },
  'Phantoms': { conf:'C', cur:3,  pts:66, gp:53, pct:0.623, rem:29, proj:99, projPos:4  },
  'Meltdown': { conf:'C', cur:4,  pts:66, gp:52, pct:0.635, rem:30, proj:96, projPos:5  },
  'Steamers': { conf:'C', cur:5,  pts:61, gp:53, pct:0.575, rem:29, proj:100, projPos:3  },
  'Mariners': { conf:'C', cur:6,  pts:58, gp:52, pct:0.558, rem:29, proj:87, projPos:7  },
  'Marauders': { conf:'C', cur:7,  pts:57, gp:53, pct:0.538, rem:29, proj:96, projPos:6  },
  'Snowdogs': { conf:'C', cur:8,  pts:54, gp:52, pct:0.519, rem:30, proj:79, projPos:10  },
  'Cunts': { conf:'C', cur:9,  pts:54, gp:54, pct:0.5, rem:28, proj:83, projPos:9  },
  'WaffleBots': { conf:'C', cur:10,  pts:52, gp:53, pct:0.491, rem:29, proj:85, projPos:8  },
  'Chiefs': { conf:'C', cur:11,  pts:31, gp:53, pct:0.292, rem:29, proj:55, projPos:11  },
};
function ordinal(n) { return n+(n===1?'st':n===2?'nd':n===3?'rd':'th'); }

// ── OV-vs-standings rivalry badge ──────────────────────────────────────────
// Compares a team's roster OV rank within their conference against their
// actual current standing, generating punchy snark for big discrepancies.
function rivalrySnark(t, st) {
  if (!st || !D[t]) return '';
  const ov      = parseInt(D[t].po);
  const confTeams = TEAMS.filter(x => STANDINGS[x] && STANDINGS[x].conf === st.conf);
  // Standard ranking: ovRank = 1 + count of conf teams with strictly higher OV
  const ovRank  = 1 + confTeams.filter(x => parseInt(D[x].po) > ov).length;
  const curRank = st.cur;
  const delta   = curRank - ovRank;   // positive = underperforming vs OV
  const conf    = st.conf === 'W' ? 'Wales' : 'Campbell';
  const ovOrd   = ordinal(ovRank);
  const curOrd  = ordinal(curRank);
  if      (delta >=  5) return `<div class="card-rivalry under">OV-${ov} roster rates ${ovOrd} in the ${conf} — somehow sitting ${curOrd} 💀</div>`;
  else if (delta >=  2) return `<div class="card-rivalry under">OV-${ov} roster should be ${ovOrd} in the ${conf} — sitting ${curOrd} 📉</div>`;
  else if (delta <= -5) return `<div class="card-rivalry over">OV-${ov} roster is only ${ovOrd}-rated in the ${conf} — somehow ${curOrd}?! 🔥</div>`;
  else if (delta <= -2) return `<div class="card-rivalry over">OV-${ov} roster only ${ovOrd} in the ${conf} — punching up at ${curOrd} 💪</div>`;
  return `<div class="card-rivalry vanilla">OV-${ov} roster rates ${ovOrd} in the ${conf} — performing as expected 🍦</div>`;
}

// ── Player index for global search ─────────────────────────────────────────
let _playerIndex = [];

function buildPlayerIndex() {
  _playerIndex = [];
  TEAMS.forEach(team => {
    const t = D[team];
    const push = (arr, type, isGoalie) => (arr || []).forEach(p => {
      const _ns = nhlLookup(p.nm);
      _playerIndex.push({
        cleanNm: cleanNHLKey(p.nm).toLowerCase(),
        nm: p.nm, sp: p.sp, ij: p.ij,
        team, type,
        pos: isGoalie ? 'G' : (_ns.pos || p.p || ''),
        ov: p.ov,
        _ns,
        isGoalie,
      });
    });
    push(t.ps, 'pro',  false);
    push(t.pg, 'pro',  true);
    push(t.fs, 'farm', false);
    push(t.fg, 'farm', true);
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────
function ovClass(v) {
  const n = parseInt(v, 10);
  if (n >= 85) return 'elite';
  if (n >= 75) return 'good';
  if (n >= 65) return 'avg';
  return 'poor';
}
function ovPill(v) {
  return `<span class="ov ${ovClass(v)}">${v}</span>`;
}

// Escape HTML special characters to prevent XSS when rendering user input
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function cleanNHLKey(nm) {
  return nm.replace(/\s*\([RCA]\)/g, '').trim();
}

function nhlCombine(a, b) {
  // Combine two season stat objects. Returns {} if both empty.
  if (!a || !Object.keys(a).length) return b || {};
  if (!b || !Object.keys(b).length) return a || {};
  // Skater combined
  if ('pts' in a || 'pts' in b) {
    const n = s => parseInt(s)||0;
    return {
      gp:  String(n(a.gp)  + n(b.gp)),
      g:   String(n(a.g)   + n(b.g)),
      a:   String(n(a.a)   + n(b.a)),
      pts: String(n(a.pts) + n(b.pts)),
      pm:  String(n(a.pm)  + n(b.pm)),
      pim: String(n(a.pim) + n(b.pim)),
      sog: String(n(a.sog) + n(b.sog)),
    };
  }
  // Goalie combined (weighted averages for GAA and SV%)
  const n = s => parseInt(s)||0;
  const f = s => parseFloat(s)||0;
  const gpA = n(a.gp), gpB = n(b.gp), gpT = gpA + gpB;
  const gaa = gpT ? ((f(a.gaa)*gpA + f(b.gaa)*gpB)/gpT) : 0;
  const svp = gpT ? ((f(a.svp)*gpA + f(b.svp)*gpB)/gpT) : 0;
  return {
    gp:  String(gpT),
    w:   String(n(a.w)  + n(b.w)),
    l:   String(n(a.l)  + n(b.l)),
    ot:  String(n(a.ot) + n(b.ot)),
    gaa: gaa.toFixed(2),
    svp: svp.toFixed(3).replace(/^0/,''),
    so:  String(n(a.so) + n(b.so)),
  };
}

function nhlLookup(nm) {
  const k = cleanNHLKey(nm);
  if (_season === '2526') return NS[k]   || {};
  if (_season === '2425') {
    const cur = NS[k] || {};
    const prev = Object.assign({}, NS24[k] || {});
    if (cur.url) prev.url = cur.url;
    if (cur.pos) prev.pos = cur.pos;
    return prev;
  }
  const cur = NS[k] || {};
  const combined = nhlCombine(NS24[k], cur);  // combined
  if (cur.url) combined.url = cur.url;         // carry through link / pos metadata
  if (cur.pos) combined.pos = cur.pos;
  return combined;
}

function nhlSeasonLabel() {
  if (_season === '2526') return 'NHL 2025-26';
  if (_season === '2425') return 'NHL 2024-25';
  return 'NHL 2024-2026';
}

function nameTags(nm, sp, ns) {
  let n = nm, tags = '';
  if (n.includes('(R)')) { n = n.replace('(R)',''); tags += '<span class="tag r">R</span>'; }
  if (n.includes('(C)')) { n = n.replace('(C)',''); tags += '<span class="tag c">C</span>'; }
  if (n.includes('(A)')) { n = n.replace('(A)',''); tags += '<span class="tag a">A</span>'; }
  if (sp === '2') tags += '<span class="tag sp2">★★</span>';
  else if (sp === '1') tags += '<span class="tag sp1">★</span>';
  const nameHtml = (ns && ns.url)
    ? `<a class="pnm player-link" href="${ns.url}" target="_blank" rel="noopener noreferrer">${n.trim()}</a>`
    : `<span class="pnm">${n.trim()}</span>`;
  return `${nameHtml}${tags}`;
}

function ijTag(ij) {
  return (ij && ij !== '' && ij !== '0')
    ? `<span class="tag ij">IJ${ij}</span>` : '';
}

// NHL stat cell
function nhlCell(val, cls='') {
  if (val === '' || val === undefined || val === null) {
    return `<td class="nhl-col nhl-blank">—</td>`;
  }
  return `<td class="nhl-col ${cls}">${val}</td>`;
}
function pmCell(v) {
  if (v === '' || v === undefined) return `<td class="nhl-col nhl-blank">—</td>`;
  const cls = parseInt(v) >= 0 ? 'nhl-pm pos-val' : 'nhl-pm neg-val';
  const display = parseInt(v) > 0 ? '+'+v : v;
  return `<td class="nhl-col ${cls}">${display}</td>`;
}

// Fantasy stat cell
function fsCell(v, lo=55, hi=78) {
  if (!v || v === '') return `<td class="fant-col fs">—</td>`;
  const n = parseInt(v,10);
  let cls = 'fs';
  if (n >= hi) cls += ' hi';
  else if (n <= lo) cls += ' lo';
  return `<td class="fant-col ${cls}">${v}</td>`;
}

// ── Sorted body HTML ───────────────────────────────────────────────────────
function skaterBody() {
  let sorted = [..._state.skaters];
  const { col, dir } = _state.sSort;
  if (col !== null) {
    const get = SKATER_SORT[col];
    sorted.sort((a, b) => {
      const av = get(a), bv = get(b);
      if (av < bv) return dir;
      if (av > bv) return -dir;
      return 0;
    });
  }
  return sorted.map(skaterRow).join('');
}

function goalieBody() {
  let sorted = [..._state.goalies];
  const { col, dir } = _state.gSort;
  if (col !== null) {
    const get = GOALIE_SORT[col];
    sorted.sort((a, b) => {
      const av = get(a), bv = get(b);
      if (av < bv) return dir;
      if (av > bv) return -dir;
      return 0;
    });
  }
  return sorted.map(goalieRow).join('');
}

// ── Attach sort click handlers after table render ──────────────────────────
function attachSortHandlers() {
  const sTbl = document.getElementById('skater-tbl');
  if (sTbl) {
    const ths = sTbl.querySelectorAll('thead tr.cols th');
    ths.forEach((th, i) => {
      if (!SKATER_SORT[i]) return;
      th.classList.add('sortable');
      th.addEventListener('click', () => {
        if (_state.sSort.col === i) {
          _state.sSort.dir *= -1;
        } else {
          _state.sSort.col = i;
          _state.sSort.dir = -1;
        }
        ths.forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
        th.classList.add(_state.sSort.dir === 1 ? 'sort-asc' : 'sort-desc');
        sTbl.querySelector('tbody').innerHTML = skaterBody();
      });
    });
  }

  const gTbl = document.getElementById('goalie-tbl');
  if (gTbl) {
    const ths = gTbl.querySelectorAll('thead tr.cols th');
    ths.forEach((th, i) => {
      if (!GOALIE_SORT[i]) return;
      th.classList.add('sortable');
      th.addEventListener('click', () => {
        if (_state.gSort.col === i) {
          _state.gSort.dir *= -1;
        } else {
          _state.gSort.col = i;
          _state.gSort.dir = -1;
        }
        ths.forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
        th.classList.add(_state.gSort.dir === 1 ? 'sort-asc' : 'sort-desc');
        gTbl.querySelector('tbody').innerHTML = goalieBody();
      });
    });
  }
}

function renderSearch(query) {
  const q = query.trim().toLowerCase();
  if (!q) { renderHome(); return; }

  const results = _playerIndex.filter(p => p.cleanNm.includes(q));

  if (!results.length) {
    document.getElementById('main').innerHTML = `
      <div class="home">
        <h2>Search</h2>
        <p style="color:var(--muted);margin-top:8px">No players found matching "<strong style="color:var(--text)">${escHtml(query)}</strong>"</p>
      </div>`;
    return;
  }

  // Sort by OV descending
  results.sort((a, b) => (parseInt(b.ov) || 0) - (parseInt(a.ov) || 0));

  const rows = results.map(r => {
    const ns  = r._ns;
    const gp  = ns.gp  !== undefined ? ns.gp  : '—';
    const pts = ns.pts !== undefined ? ns.pts : '—';
    return `<tr class="search-hit-row" onclick="navigate('${r.team}','${r.type}')">
      <td class="left" style="min-width:160px">${nameTags(r.nm, r.sp, r._ns)}${ijTag(r.ij)}</td>
      <td class="left"><span class="pos">${r.pos}</span></td>
      <td class="left" style="color:var(--amber);font-weight:700">${r.team}</td>
      <td class="left"><span class="roster-tag ${r.type}" style="font-size:9px;padding:2px 6px">${r.type}</span></td>
      <td>${ovPill(r.ov)}</td>
      <td class="nhl-col">${gp}</td>
      <td class="nhl-col nhl-pts">${pts}</td>
    </tr>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="home">
      <h2>Search</h2>
      <p class="search-count">${results.length} player${results.length !== 1 ? 's' : ''} matching "<strong style="color:var(--text)">${escHtml(query)}</strong>"</p>
      <div class="tbl-wrap"><table>
        <thead>
          <tr class="grp">
            <th class="g-info" colspan="4"></th>
            <th class="g-info" colspan="1"></th>
            <th class="g-nhl"  colspan="2">NHL 2025-26</th>
          </tr>
          <tr class="cols">
            <th class="left">Player</th>
            <th class="left">Pos</th>
            <th class="left">Team</th>
            <th class="left">Roster</th>
            <th>OV</th>
            <th class="nhl-col">GP</th>
            <th class="nhl-col">PTS</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}

// ── Home screen ───────────────────────────────────────────────────────────
function renderHome() {
  const cards = TEAMS.map(t => {
    const tm = D[t];
    const st = STANDINGS[t];
    let stdHtml = '';
    if (st) {
      const confFull = st.conf === 'W' ? 'Wales' : 'Campbell';
      const curLabel = `${confFull} · ${ordinal(st.cur)}`;
      const projLabel = `${confFull} · ${ordinal(st.projPos)}`;
      const pctPct = (st.pct * 100).toFixed(1);
      stdHtml = `
      <div class="card-standings">
        <div class="card-std-row">
          <span class="card-std-badge cur">NOW</span>
          <span class="card-std-pts">${st.pts} pts</span>
          <span class="card-std-meta">${curLabel}</span>
        </div>
        <div class="card-std-row">
          <span class="card-std-badge proj">PROJ</span>
          <span class="card-std-pts">~${st.proj} pts</span>
          <span class="card-std-meta">${projLabel}</span>
        </div>
        ${rivalrySnark(t, st)}
      </div>`;
    }
    return `<div class="team-card" onclick="navigate('${t}','pro')">
      <h3>${t}</h3>
      <div class="card-gm">${tm.gm}</div>
      <div class="card-foot">
        <span class="card-ov">${tm.po}</span>
        <span class="card-farm">${tm.fn}</span>
      </div>${stdHtml}
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="home">
      <h2>RWHA Teams</h2>
      <p class="home-sub">Select a team to view the RWHA pro &amp; farm rosters against the current and previous season NHL stats.</p>
      <div class="team-grid">${cards}</div>
    </div>`;
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function buildSidebar() {
  document.getElementById('sidebar').innerHTML =
    `<div class="nav-section">
      <div class="nav-heading">Teams</div>
      ${TEAMS.map(t => `
        <div class="nav-team">
          <div class="nav-team-name" onclick="toggleTeam('${t}')">
            <span class="tnm">${t}</span>
            <span class="tov">${D[t].po}</span>
          </div>
          <div class="nav-sub" id="sub-${t}">
            <a class="nav-link" id="nl-${t}-pro"  onclick="navigate('${t}','pro')">
              Pro — ${t}</a>
            <a class="nav-link" id="nl-${t}-farm" onclick="navigate('${t}','farm')">
              Farm — ${D[t].fn}</a>
          </div>
        </div>`).join('')}
    </div>`;
}

function toggleTeam(t) {
  document.getElementById('sub-' + t).classList.toggle('open');
}

// ── Mobile nav ──────────────────────────────────────────────────────────────
function closeMobileNav() {
  document.getElementById('sidebar').classList.remove('nav-open');
  document.getElementById('nav-overlay').classList.remove('nav-open');
}

// ── Navigation ─────────────────────────────────────────────────────────────
function navigate(team, type) {
  closeMobileNav();
  document.getElementById('player-search').value = '';
  document.querySelectorAll('.nav-link.active').forEach(el => el.classList.remove('active'));
  const link = document.getElementById(`nl-${team}-${type}`);
  if (link) { link.classList.add('active'); }
  document.getElementById(`sub-${team}`)?.classList.add('open');
  renderRoster(team, type);
  window.location.hash = `${team}/${type}`;
}

// ── Go home ────────────────────────────────────────────────────────────────
function goHome() {
  closeMobileNav();
  document.getElementById('player-search').value = '';
  document.querySelectorAll('.nav-link.active').forEach(el => el.classList.remove('active'));
  _currentTeam = null; _currentType = null;
  history.replaceState(null, '', window.location.pathname);
  renderHome();
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  buildSidebar();
  buildPlayerIndex();

  // Mobile nav toggle
  document.getElementById('nav-toggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('nav-open');
    document.getElementById('nav-overlay').classList.toggle('nav-open');
  });
  document.getElementById('nav-overlay').addEventListener('click', closeMobileNav);

  // NHL stats status badge
  const matched = Object.values(NS).filter(v => Object.keys(v).length > 0).length;
  const total   = Object.keys(NS).length;
  document.getElementById('hdr-nhl-status').textContent =
    `NHL: ${matched}/${total} players`;

  // Search handler
  let _searchTimeout;
  document.getElementById('player-search').addEventListener('input', function() {
    clearTimeout(_searchTimeout);
    const q = this.value;
    _searchTimeout = setTimeout(() => {
      document.querySelectorAll('.nav-link.active').forEach(el => el.classList.remove('active'));
      renderSearch(q);
    }, 150);
  });

  const hash = window.location.hash.slice(1);
  if (hash) {
    const [team, type] = hash.split('/');
    if (D[team] && (type === 'pro' || type === 'farm')) {
      navigate(team, type);
      return;
    }
  }
  renderHome();
}

window.addEventListener('hashchange', () => {
  const [team, type] = window.location.hash.slice(1).split('/');
  if (D[team] && (type === 'pro' || type === 'farm')) navigate(team, type);
});

init();
</script>
