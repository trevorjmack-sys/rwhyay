name: Update RWHA Roster Data

# Runs daily at 06:00 UTC (before the nightly NHL stats job).
# Also triggerable manually from the Actions tab — run this after any trade
# or roster move in STHS to keep data.js current.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Scrape RWHA rosters and update data.js
        run: python .github/scripts/update_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet data.js; then
            echo "data.js unchanged — nothing to commit."
          else
            git add data.js
            git commit -m "Auto-update RWHA roster data [${DATA_DATE}] - ${DATA_TEAMS} teams, ${DATA_PLAYERS} players"
            git push
          fi
