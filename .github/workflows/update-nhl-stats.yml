name: Update NHL Stats

# Runs every 3 days at 02:00 AM Pacific (10:00 UTC).
# Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch current-season NHL stats and update nhl_stats.js
        run: python .github/scripts/update_nhl_stats.py

      - name: Commit and push if stats changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet nhl_stats.js; then
            echo "nhl_stats.js unchanged - nothing to commit."
          else
            git add nhl_stats.js
            git commit -m "Auto-update NHL stats [$(date -u '+%Y-%m-%d')] - ${NHL_MATCHED}/${NHL_TOTAL} players"
            git push
          fi
